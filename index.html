<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Startup News</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --badge-bg: rgba(59, 130, 246, 0.2);
            --badge-text: #60a5fa;
            
            /* Category Colors */
            --cat-funding: #10b981;
            --cat-layoffs: #ef4444;
            --cat-recruitment: #f59e0b;
            --cat-startup: #8b5cf6;
            --cat-it: #06b6d4;
            --cat-business: #f43f5e;
            --city-color: #d946ef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.15), transparent 400px);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .last-updated {
            font-size: 0.9rem;
            color: #10b981;
            margin-top: 1rem;
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .city-select {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
            appearance: none;
            padding-right: 2.5rem;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2360a5fa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
            transition: all 0.2s ease;
        }
        
        .city-select:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .city-select option {
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .site-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .location-badge {
            background: rgba(217, 70, 239, 0.15);
            color: var(--city-color);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(217, 70, 239, 0.3);
        }

        .cat-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid transparent;
        }
        
        .cat-badge.funding { background: rgba(16, 185, 129, 0.2); color: var(--cat-funding); border-color: rgba(16, 185, 129, 0.3); }
        .cat-badge.layoffs { background: rgba(239, 68, 68, 0.2); color: var(--cat-layoffs); border-color: rgba(239, 68, 68, 0.3); }
        .cat-badge.recruitment { background: rgba(245, 158, 11, 0.2); color: var(--cat-recruitment); border-color: rgba(245, 158, 11, 0.3); }
        .cat-badge.startup { background: rgba(139, 92, 246, 0.2); color: var(--cat-startup); border-color: rgba(139, 92, 246, 0.3); }
        .cat-badge.it-industry { background: rgba(6, 182, 212, 0.2); color: var(--cat-it); border-color: rgba(6, 182, 212, 0.3); }
        .cat-badge.business { background: rgba(244, 63, 94, 0.2); color: var(--cat-business); border-color: rgba(244, 63, 94, 0.3); }

        .date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: auto;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            flex-grow: 1;
        }

        .title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .title a:hover {
            color: var(--accent-hover);
        }

        .read-more {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .read-more:hover {
            color: var(--accent-hover);
        }
        
        .read-more::after {
            content: ' →';
            transition: margin-left 0.2s ease;
        }

        .read-more:hover::after {
            margin-left: 5px;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            padding: 3rem 0;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .loading span {
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.2rem;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Live Startup News</h1>
            <p class="subtitle">Filtered, Categorized, and Real-Time</p>
            <div id="last-updated" class="last-updated" style="display: none;"></div>
        </header>

        <div class="controls-container">
            <div class="filters" id="filters">
                <button class="filter-btn active" data-filter="all">All Categories</button>
                <button class="filter-btn" data-filter="Funding">Funding</button>
                <button class="filter-btn" data-filter="Layoffs">Layoffs</button>
                <button class="filter-btn" data-filter="Recruitment">Recruitment</button>
                <button class="filter-btn" data-filter="Startup">Startup</button>
                <button class="filter-btn" data-filter="IT Industry">IT Industry</button>
                <button class="filter-btn" data-filter="Business">Business</button>
            </div>
            
            <select id="cityFilter" class="city-select">
                <option value="all">📍 All Cities (National)</option>
                <option value="Bengaluru">📍 Bengaluru</option>
                <option value="Hyderabad">📍 Hyderabad</option>
                <option value="Pune">📍 Pune</option>
                <option value="Chennai">📍 Chennai</option>
                <option value="Mumbai">📍 Mumbai</option>
                <option value="Delhi NCR">📍 Delhi NCR</option>
                <option value="Ahmedabad">📍 Ahmedabad</option>
                <option value="Kolkata">📍 Kolkata</option>
                <option value="Gurugram">📍 Gurugram</option>
                <option value="Noida">📍 Noida</option>
                <option value="Chandigarh">📍 Chandigarh</option>
                <option value="Jaipur">📍 Jaipur</option>
                <option value="Visakhapatnam">📍 Visakhapatnam</option>
                <option value="Indore">📍 Indore</option>
                <option value="Coimbatore">📍 Coimbatore</option>
                <option value="Bhubaneswar">📍 Bhubaneswar</option>
                <option value="Lucknow">📍 Lucknow</option>
                <option value="Thiruvananthapuram">📍 Thiruvananthapuram</option>
                <option value="Kochi">📍 Kochi</option>
                <option value="Nashik">📍 Nashik</option>
            </select>
        </div>

        <div id="news-grid" class="grid">
            <div class="loading"><span>Fetching latest categorized news...</span></div>
        </div>
    </div>

    <script>
        let allArticles = [];
        let currentFilter = 'all';
        let currentCity = 'all';

        // Set up filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                renderGrid();
            });
        });

        // Set up city dropdown
        document.getElementById('cityFilter').addEventListener('change', (e) => {
            currentCity = e.target.value;
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            
            let filtered = allArticles;
            
            // Apply category filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(a => a.category === currentFilter);
            }
            
            // Apply city filter
            if (currentCity !== 'all') {
                // To support both older format (no city field) and new format
                filtered = filtered.filter(a => (a.city || 'National') === currentCity);
            }
                
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="loading">No articles found matching your criteria.</div>`;
                return;
            }

            filtered.forEach(article => {
                let dateStr = article.published;
                try {
                    const d = new Date(article.published);
                    if (!isNaN(d.getTime())) {
                        dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    }
                } catch (e) {}

                // Make safe css class
                const safeClass = article.category.toLowerCase().replace(' ', '-');
                
                // Get city tag
                const cityTag = (article.city && article.city !== 'National') 
                    ? `<span class="location-badge">📍 ${article.city}</span>` 
                    : '';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="badges">
                            ${cityTag}
                            <span class="cat-badge ${safeClass}">${article.category}</span>
                            <span class="site-badge">${article.site}</span>
                        </div>
                        <span class="date">${dateStr}</span>
                    </div>
                    <h2 class="title">
                        <a href="${article.link}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                    </h2>
                    <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="read-more">Read Article</a>
                `;
                grid.appendChild(card);
            });
        }

        async function fetchNews() {
            try {
                const response = await fetch('news.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                allArticles = data.articles;
                
                document.getElementById('last-updated').style.display = 'inline-block';
                document.getElementById('last-updated').innerText = 'Last Updated: ' + data.last_updated;

                renderGrid();
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('news-grid').innerHTML = '<div class="loading">Error loading news. Ensure the scraper is running.</div>';
            }
        }

        fetchNews();
        setInterval(fetchNews, 60000);
    </script>
</body>
</html>
